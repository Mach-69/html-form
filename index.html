<!DOCTYPE html>
<html>
<body>
    <h2>Appointment Booking Form</h2>

    <form onsubmit="return printSummary()">
        <label for="name">Patient Name:</label>
        <input type="text" id="name"><br>

        <label for="id">ID Number:</label>
        <input type="text" id="id" value ="NA for regular"><br>

        <label for="service">Service:</label>
        <select id="service">
            <option value="Dental Check-up">Dental Check-up (PHP 850)</option>
            <option value="Eye Check-up">Eye Check-up (PHP 900)</option>
            <option value="Physical Exam">Physical Exam (PHP 800)</option>
        </select><br>

        <label for="sessions">Sessions (Max 3):</label>
        <input type="number" id="sessions" min="1" max="3"><br>

        <label for="type">Customer Type:</label>
        <select id="type">
            <option value="Regular">Regular</option>
            <option value="PWD/Senior">PWD/Senior</option>
        </select><br><br>

        <input type="submit" value="Book Appointment">
    </form>

    <div id="summary"></div>

    <script>
        function calculateSubtotal(service, sessions) {
            let price = 0;
            switch (service) {
                case "Dental Check-up": price = 850; break;
                case "Eye Check-up": price = 900; break;
                case "Physical Exam": price = 800; break;
                default: return 0;
            }
            return price * sessions;
        }

        function calculateDiscount(total, custType) {
            if (custType === "PWD/Senior") {
                return total * 0.15;
            }
            return 0;
        }

        function printSummary() {
            var n = document.getElementById('name').value;
            var i = document.getElementById('id').value;
            var s = document.getElementById('service').value;
            var sess = parseInt(document.getElementById('sessions').value);
            var t = document.getElementById('type').value;

            var sub = calculateSubtotal(s, sess);
            var disc = calculateDiscount(sub, t);
            var total = sub - disc;

           var display = document.getElementById('summary');
            display.innerHTML = "<br><h2>APPOINTMENT SUMMARY</h2>" +
                "Patient Name: " + n + "<br>" +
                "ID Number: " + i + "<br>" +
                "Service: " + s + "<br>" +
                "Sessions: " + sess + "<br>" +
                "Type: " + t + "<br>" +
                "Subtotal: PHP " + sub + "<br>" +
                "Discount: PHP " + disc + "<br>" +
                "Total: PHP " + total;

            return false;
        }
    </script>
</body>
</html>
